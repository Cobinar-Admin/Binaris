<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#000000"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Binaris"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>Binaris — Sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>

<!-- Auth guard: if already signed in, skip login immediately -->
<script type="module">
  import { auth, onAuthStateChanged } from "./firebase-init.js";
  document.documentElement.style.visibility = "hidden";
  const _u = onAuthStateChanged(auth, (user) => {
    _u();
    if (user) { window.location.replace("./index.html"); }
    else { document.documentElement.style.visibility = ""; }
  });
</script>

<style>
/* ── DESIGN TOKENS (mirrors main app) ─────────────────────────── */
:root {
  --bg:#000; --s1:#080808; --s2:#0f0f0f; --s3:#161616; --s4:#1e1e1e;
  --w1:#fff; --w2:rgba(255,255,255,.72); --w3:rgba(255,255,255,.38);
  --w4:rgba(255,255,255,.16); --w5:rgba(255,255,255,.07);
  --b1:rgba(255,255,255,.08); --b2:rgba(255,255,255,.13); --b3:rgba(255,255,255,.22);
  --ok:#32d583; --err:#ff4444;
  --r-sm:7px; --r-md:11px; --r-lg:14px; --r-xl:18px; --r-2xl:22px; --r-pill:9999px;
  --font:"Geist","Inter",system-ui,sans-serif;
  --mono:"Geist Mono","JetBrains Mono",monospace;
  --serif:"Instrument Serif",Georgia,serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--w1);
  font-family:var(--font);-webkit-font-smoothing:antialiased;
  font-size:14.5px;line-height:1.5;
  touch-action:manipulation;
}
html{background:#000;}
*{-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
input{-webkit-user-select:text;user-select:text}

/* ── PAGE SHELL ──────────────────────────────────────────────── */
.page{
  min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  padding:calc(var(--safe-top) + 24px) 20px calc(var(--safe-bottom) + 24px);
}

/* ── BACKGROUND VECTOR LAYER ─────────────────────────────────── */
.bg-layer{
  position:fixed;inset:0;
  pointer-events:none;z-index:0;overflow:hidden;
}
.bg-svg{
  position:absolute;inset:0;width:100%;height:100%;
}

/* Slowly rotating rings */
.vr1{animation:vr-spin 32s linear infinite;transform-origin:50% 50%}
.vr2{animation:vr-spin 55s linear infinite reverse;transform-origin:50% 50%}
.vr3{animation:vr-spin 78s linear infinite;transform-origin:50% 50%}
@keyframes vr-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Breathing shapes */
.v-breathe {animation:vb 6s ease-in-out infinite;transform-origin:50% 50%}
.v-breathe-2{animation:vb 9s ease-in-out infinite 1s;transform-origin:50% 50%}
@keyframes vb{0%,100%{opacity:.04;transform:scale(1)}50%{opacity:.10;transform:scale(1.04)}}

/* Drifting corner hexagons */
.v-hex{animation:v-drift linear infinite;transform-box:fill-box}
@keyframes v-drift{
  0%  {transform:rotate(0deg) translateY(0px);opacity:0}
  8%  {opacity:.07}
  50% {transform:rotate(180deg) translateY(-18px);opacity:.07}
  92% {opacity:.07}
  100%{transform:rotate(360deg) translateY(0px);opacity:0}
}

/* Ambient glow blobs */
.v-glow{
  position:absolute;border-radius:50%;
  filter:blur(90px);pointer-events:none;
  animation:vg-pulse 9s ease-in-out infinite;
}
.vg1{
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 70%);
  top:-140px;left:-120px;
}
.vg2{
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(80,100,255,.025) 0%,transparent 70%);
  bottom:-180px;right:-120px;animation-delay:3.5s;
}
.vg3{
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(50,213,131,.02) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.8s;
}
@keyframes vg-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.2);opacity:.6}}

/* Subtle scanline overlay for depth */
.bg-scanlines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 3px,
    rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 4px
  );
}

/* ── LOGIN CARD ──────────────────────────────────────────────── */
.card{
  position:relative;z-index:10;
  width:100%;max-width:375px;
  background:rgba(7,7,7,.93);
  border:1px solid rgba(255,255,255,.10);
  border-radius:28px;
  padding:42px 32px 38px;
  display:flex;flex-direction:column;align-items:center;
  backdrop-filter:blur(40px);
  box-shadow:
    0 50px 130px rgba(0,0,0,.85),
    0 0 0 1px rgba(255,255,255,.04) inset;
  animation:card-in .65s cubic-bezier(.16,1,.3,1) both;
}
@keyframes card-in{
  from{opacity:0;transform:translateY(28px) scale(.96)}
  to  {opacity:1;transform:translateY(0) scale(1)}
}

/* ── LOGO ORB ────────────────────────────────────────────────── */
.orb-wrap{
  position:relative;
  width:84px;height:84px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:26px;
}
/* Pulsing rings identical to splash screen */
.orb-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
  animation:oring 2.8s ease-in-out infinite;
}
.orb-ring:nth-child(1){inset:0;animation-delay:0s}
.orb-ring:nth-child(2){inset:-13px;border-color:rgba(255,255,255,.07);animation-delay:.95s}
.orb-ring:nth-child(3){inset:-26px;border-color:rgba(255,255,255,.04);animation-delay:1.9s}
@keyframes oring{
  0%,100%{transform:scale(1);opacity:.8}
  50%    {transform:scale(1.10);opacity:.28}
}
/* Logo image container */
.orb-logo{
  position:relative;z-index:2;
  width:84px;height:84px;border-radius:21px;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.12);
  animation:orb-breathe 3.2s ease-in-out infinite;
  flex-shrink:0;
}
.orb-logo img{
  width:84px;height:84px;display:block;object-fit:cover;
}
/* Fallback gradient if image fails */
.orb-logo-fallback{
  position:absolute;inset:0;
  background:radial-gradient(circle at 38% 36%,#fff 0%,#666 55%,#1a1a1a 100%);
  display:none;
}
@keyframes orb-breathe{
  0%,100%{
    transform:scale(1);
    box-shadow:0 8px 32px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.12)
  }
  50%{
    transform:scale(1.04);
    box-shadow:0 14px 44px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.20),0 0 44px rgba(255,255,255,.07)
  }
}

/* ── TYPOGRAPHY ──────────────────────────────────────────────── */
.wordmark{
  font-family:var(--font);
  font-size:1.5rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;
  color:var(--w1);margin-bottom:7px;
  animation:card-in .65s .08s cubic-bezier(.16,1,.3,1) both;
}
.tagline{
  font-family:var(--serif);
  font-size:.92rem;font-style:italic;
  color:var(--w3);margin-bottom:34px;
  animation:card-in .65s .14s cubic-bezier(.16,1,.3,1) both;
}

/* ── FEATURE CHIPS ───────────────────────────────────────────── */
.features{
  display:flex;gap:7px;width:100%;margin-bottom:24px;
  animation:card-in .65s .18s cubic-bezier(.16,1,.3,1) both;
}
.feat{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 8px;
  background:var(--w5);border:1px solid var(--b1);border-radius:var(--r-md);
}
.feat-ico{font-size:.88rem}
.feat-txt{
  font-family:var(--mono);font-size:.56rem;
  color:var(--w3);letter-spacing:.05em;white-space:nowrap;
}

/* ── GOOGLE SIGN-IN BUTTON ───────────────────────────────────── */
.btn-google{
  width:100%;
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 20px;
  background:var(--w1);color:#0a0a0a;
  border:none;border-radius:var(--r-xl);
  font-family:var(--font);font-size:.9rem;font-weight:600;
  cursor:pointer;
  transition:background .15s,transform .12s,box-shadow .15s;
  box-shadow:0 4px 24px rgba(255,255,255,.14);
  animation:card-in .65s .24s cubic-bezier(.16,1,.3,1) both;
  position:relative;overflow:hidden;
}
.btn-google:hover:not(:disabled){
  background:rgba(255,255,255,.93);
  transform:translateY(-1.5px);
  box-shadow:0 10px 36px rgba(255,255,255,.20);
}
.btn-google:active:not(:disabled){transform:translateY(0) scale(.98)}
.btn-google:disabled{opacity:.5;cursor:not-allowed}
/* Button shimmer sweep */
.btn-google::after{
  content:"";
  position:absolute;top:0;left:-100%;
  width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.38),transparent);
  animation:shimmer 4s ease infinite 1.8s;
  pointer-events:none;
}
@keyframes shimmer{0%{left:-100%}25%{left:140%}100%{left:140%}}

/* Loading state */
.btn-spinner{
  display:none;width:16px;height:16px;
  border:2px solid rgba(0,0,0,.15);border-top-color:#0a0a0a;
  border-radius:50%;animation:spin .65s linear infinite;flex-shrink:0;
}
.btn-google.loading .btn-spinner{display:block}
.btn-google.loading .g-icon,
.btn-google.loading .btn-text{display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ─────────────────────────────────────────────────── */
.divider{
  width:100%;display:flex;align-items:center;gap:10px;
  margin:20px 0 16px;
  animation:card-in .65s .28s cubic-bezier(.16,1,.3,1) both;
}
.div-line{flex:1;height:1px;background:var(--b1)}
.div-txt{
  font-family:var(--mono);font-size:.59rem;
  color:var(--w3);letter-spacing:.09em;
}

/* ── TERMS ───────────────────────────────────────────────────── */
.terms{
  font-family:var(--mono);font-size:.59rem;
  color:var(--w3);text-align:center;line-height:1.7;
  letter-spacing:.03em;
  animation:card-in .65s .32s cubic-bezier(.16,1,.3,1) both;
}
.terms a{color:var(--w2);text-decoration:underline;text-underline-offset:2px;cursor:pointer}

/* ── BYLINE ──────────────────────────────────────────────────── */
.byline{
  margin-top:20px;
  font-family:var(--mono);font-size:.59rem;
  color:var(--w3);letter-spacing:.07em;text-align:center;
  animation:card-in .65s .36s cubic-bezier(.16,1,.3,1) both;
}
.byline strong{color:var(--w2);font-weight:500}

/* ── ERROR TOAST ─────────────────────────────────────────────── */
.err-toast{
  position:fixed;bottom:calc(var(--safe-bottom) + 28px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.28);
  color:#ff8080;border-radius:var(--r-pill);
  padding:10px 18px;font-size:.76rem;font-weight:500;
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 36px rgba(0,0,0,.65);
  opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;
  white-space:nowrap;z-index:200;max-width:calc(100vw - 32px);
}
.err-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:400px){
  .card{padding:32px 20px 28px;border-radius:24px;max-width:340px}
  .wordmark{font-size:1.3rem}
  .features{gap:5px}
  .feat-txt{font-size:.52rem}
}
</style>
</head>

<div class="bg-scanlines" aria-hidden="true"></div>

<!-- ── Sign-in logic ── -->
<script type="module">
  import { signInWithGoogle } from "./firebase-init.js";

  let errTimer = null;

  function showError(msg) {
    const toast  = document.getElementById('err-toast');
    const msgEl  = document.getElementById('err-msg');
    if (toast && msgEl) {
      msgEl.textContent = msg || 'Sign-in failed. Please try again.';
      toast.classList.add('show');
      clearTimeout(errTimer);
      errTimer = setTimeout(() => toast.classList.remove('show'), 5000);
    }
  }

  window.handleGoogleSignIn = async function () {
    const btn = document.getElementById('sign-in-btn');
    if (!btn || btn.disabled) return;
    btn.disabled = true;
    btn.classList.add('loading');
    try {
      await signInWithGoogle();
      // Firebase auth state will trigger the guard at top → redirect
      window.location.replace('./index.html');
    } catch (err) {
      btn.disabled = false;
      btn.classList.remove('loading');

      // Human-readable Firebase error messages
      const MSGS = {
        'auth/popup-closed-by-user'   : 'Sign-in cancelled.',
        'auth/popup-blocked'          : 'Pop-up blocked. Please allow pop-ups and try again.',
        'auth/network-request-failed' : 'No internet connection. Check your network.',
        'auth/cancelled-popup-request': 'Only one sign-in at a time.',
        'auth/account-exists-with-different-credential': 'Account already exists with a different provider.',
      };
      const msg = MSGS[err.code] || err.message || 'Sign-in failed. Please try again.';
      showError(msg);
    }
  };
</script>

</body>
</html>
