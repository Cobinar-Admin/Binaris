<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Signing in…</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:#0a0a0a;color:#fff;font-family:"Geist","Inter",system-ui,sans-serif;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
  .spinner{width:28px;height:28px;border:2.5px solid rgba(255,255,255,.12);
    border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .msg{font-size:.82rem;color:rgba(255,255,255,.5);font-family:"Geist Mono",monospace;letter-spacing:.04em}
  .err{color:#ff8080;font-size:.8rem;text-align:center;max-width:300px;line-height:1.6}
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Signing in with Cobinar…</div>

<script>
(async function() {
  const COBINAR_AUTH      = 'https://auth.cobinar.com';
  const COBINAR_CLIENT_ID = 'cob_2851650ad19e117258ceba3e8633b35d';
  const COBINAR_SECRET    = 'cs_f6462aef1574ddbe9b0fb13824712c460c9162c0cdd6ad37150e5e5d70ca2d52';
  const REDIRECT_URI      = window.location.origin + '/auth/callback/';

  function setMsg(text) {
    const el = document.getElementById('msg');
    if (el) el.textContent = text;
  }
  function showErr(text) {
    document.getElementById('spinner').style.display = 'none';
    const el = document.getElementById('msg');
    if (el) { el.className = 'err'; el.textContent = text; }
    // Send error to opener, then close
    if (window.opener) {
      window.opener.postMessage({ type:'cobinar-auth-result', error: text }, window.location.origin);
    }
    setTimeout(() => window.close(), 2500);
  }

  const params = new URLSearchParams(location.search);
  const code  = params.get('code');
  const error = params.get('error');
  const state = params.get('state');

  if (error) { showErr('Sign-in cancelled or denied.'); return; }
  if (!code)  { showErr('No authorization code received.'); return; }

  try {
    // ── Exchange code for tokens ────────────────────────
    setMsg('Exchanging token…');
    // Use cache:'no-store' and mode:'cors' so Binaris's service worker
    // doesn't intercept or cache this cross-origin request.
    const tokenRes = await fetch(`${COBINAR_AUTH}/oauth/token`, {
      method: 'POST',
      mode:   'cors',
      cache:  'no-store',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        grant_type:    'authorization_code',
        code,
        client_id:     COBINAR_CLIENT_ID,
        client_secret: COBINAR_SECRET,
        redirect_uri:  REDIRECT_URI,
      }),
    });
    if (!tokenRes.ok) {
      const e = await tokenRes.json().catch(()=>({}));
      showErr(e.error || 'Token exchange failed. Please try again.'); return;
    }
    const { access_token } = await tokenRes.json();

    // ── Get user info ───────────────────────────────────
    setMsg('Getting user info…');
    const userRes = await fetch(`${COBINAR_AUTH}/oauth/userinfo`, {
      headers: { 'Authorization': 'Bearer ' + access_token },
    });
    if (!userRes.ok) { showErr('Could not fetch user info. Please try again.'); return; }
    const user = await userRes.json();

    // ── Send to opener and close ────────────────────────
    setMsg('Done! Closing…');
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'cobinar-auth-result',
        user: {
          email: user.email || user.cobinarEmail || '',
          name:  user.name  || user.displayName  || '',
          photo: user.picture || user.photoURL   || '',
          uid:   user.uid   || user.sub           || '',
        },
      }, window.location.origin);
    } else {
      // No opener (e.g. redirect flow) — store and navigate
      try { localStorage.setItem('cobinar-pending-user', JSON.stringify(user)); } catch(_){}
      window.location.replace('/');
    }
    // Popup closes itself
    setTimeout(() => window.close(), 400);

  } catch(e) {
    showErr('Network error. Check your connection and try again.');
  }
})();
</script>
</body>
</html>
